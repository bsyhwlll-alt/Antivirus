; Конфигурация антивируса "CyberShield"
; Версия: 1.0
; Файл: config.ini

[General]
enabled=true
autoStart=true
language=English
updateIntervalHours=12
checkForUpdatesOnStartup=true

[Scan]
scanType=quick
scanMemory=true
scanBootSectors=true
scanArchives=true
scanTimeoutMinutes=180
excludePaths=C:\Temp\,C:\Downloads\temp\
maxFileSizeMB=200

[RealTimeProtection]
enabled=true
monitorProcesses=true
monitorFiles=true
monitorRegistry=true
heuristicAnalysis=true
cloudAnalysis=true

[Quarantine]
enabled=true
quarantinePath=C:\ProgramData\CyberShield\Quarantine\
autoDeleteInfected=false
maxQuarantineSizeMB=1000
keepQuarantineDays=60

[Updates]
autoDownload=true
autoInstall=true
updateServers=update1.cybershield.com,update2.cybershield.com
checkSignature=true

[Logging]
logLevel=info
logFile=C:\ProgramData\CyberShield\logs\antivirus.log
maxLogSizeMB=20
compressOldLogs=true

[Exclusions]
processExclusions=notepad.exe,chrome.exe
fileExclusions=*.tmp,*.log
pathExclusions=C:\Windows\,C:\Program Files\

[NetworkProtection]
firewallEnabled=true
blockMaliciousConnections=true
scanHTTPS=true
allowedPorts=80,443,22

[Performance]
cpuUsageLimit=25
scanPriority=normal
useIdleTime=true

[Notifications]
showScanProgress=true
notifyOnThreat=true
notifyOnUpdate=true
playSound=true

[Advanced]
enableRootkitDetection=true
memoryDumpAnalysis=false
deepHeuristicScan=false
customScanMasks=*.exe,*.dll,*.scr
