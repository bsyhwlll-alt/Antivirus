// 1. Включаем консоль принудительно
console "1"

// 2. Назначаем клавишу для открытия консоли (измени букву, если нужно)
bind "`" "toggleconsole"

// 3. На случай, если тильда не работает (запасной вариант на букву P)
bind "p" "toggleconsole"

{
  "ai_memory_config": {
    "enabled": true,
    "memory_limit": 102400,
    "memory_unit": "MB",
    "max_context_length": 81920,
    "history_size": 10000,
    "buffer_size": 524288,
    "cache_enabled": true,
    "cache_size": 20480,
    "persistent_storage": true,
    "storage_path": "/var/ai/memory",
    "compression": true,
    "compression_level": 6
  },
  "advanced_settings": {
    "dynamic_memory_allocation": true,
    "memory_threshold": 80,
    "auto_scale": true,
    "max_memory_gb": 16,
    "swap_enabled": true,
    "swap_size": 4096
  }
}
