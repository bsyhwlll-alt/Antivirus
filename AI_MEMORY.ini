[AI_MEMORY]
; Основные настройки памяти
enabled = true
memory_limit = 2048
memory_unit = MB
max_context = 16384
history_depth = 5000

[BUFFER_SETTINGS]
input_buffer = 1024
output_buffer = 1024
processing_buffer = 2048
overflow_protection = true

[CACHE_CONFIG]
cache_type = redis
cache_host = localhost
cache_port = 6379
cache_ttl = 3600
max_cache_items = 10000

[OPTIMIZATION]
memory_optimization = true
garbage_collection = true
gc_interval = 300
defragmentation = true
defrag_threshold = 70

[PERSISTENCE]
save_state = true
auto_save = true
save_interval = 600
backup_count = 5
memory_dump = /var/log/ai/memory.dump
