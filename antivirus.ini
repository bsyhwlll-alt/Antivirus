[General]
autoStart=false
language=English

[Scan]
scanType=quick
excludePaths=C:\Windows\,C:\Program Files\
maxFileSizeMB=100

[Updates]
autoDownload=true
updateServer=https://example.com/updates/

[Quarantine]
enabled=true
path=./quarantine/

; =====================================================
; Конфигурационный файл простого антивирусного сканера
; =====================================================

[General]
; Общие настройки приложения
ScanOnStartup=1          ; Проверять систему при запуске (1=Да, 0=Нет)
LogLevel=INFO            ; Уровень логирования (DEBUG, INFO, ERROR)
MaxThreads=4             ; Количество потоков сканирования

[ScanSettings]
; Настройки сканирования
ScanArchives=1           ; Проверять архивы (1=Да, 0=Нет)
HeuristicLevel=2         ; Уровень эвристики (0-Выкл, 1-Низкий, 2-Средний, 3-Высокий)
MaxFileSizeMB=100        ; Максимальный размер файла для проверки (в МБ)
ExcludePaths=C:\Temp,C:\Cache ; Папки, исключенные из сканирования

[Quarantine]
; Настройки карантина
QuarantineFolder=C:\Quarantine   ; Папка для хранения заблокированных файлов
MaxQuarantineSizeMB=1024         ; Максимальный размер карантина (1 ГБ)
AutoCleanDays=30                  ; Автоматически чистить файлы старше N дней

[Signatures]
; База сигнатур
SignatureDBPath=C:\ProgramData\MyAntivirus\signatures.db
UpdateIntervalHours=24     ; Интервал обновления базы (часы)
LastUpdate=2026-02-21      ; Дата последнего обновления

[UserInterface]
; Настройки интерфейса
ShowTrayIcon=1
MinimizeToTray=1
Theme=dark                 ; dark или light
Language=ru                ; Язык интерфейса (ru/en)
