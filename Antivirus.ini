; Конфигурация антивирусного ПО "SecureGuard"
; Версия: 2.1
; Файл: antivirus.ini

[General]
; Основные настройки антивируса
enabled=true
autoStart=true
language=Russian
updateIntervalHours=24
checkForUpdatesOnStartup=true

[Scan]
; Настройки сканирования системы
scanType=quick  ; quick, full, custom
scanMemory=true  ; проверять оперативную память
scanBootSectors=true  ; проверять загрузочные секторы
scanArchives=true  ; сканировать архивы
scanTimeoutMinutes=180  ; таймаут сканирования (мин)
excludePaths=C:\Temp\,C:\Downloads\temp\  ; исключённые пути
maxFileSizeMB=100  ; максимальный размер файла для сканирования (МБ)

[RealTimeProtection]
; Защита в реальном времени
enabled=true
monitorProcesses=true  ; отслеживать новые процессы
monitorFiles=true  ; отслеживать изменения файлов
monitorRegistry=true  ; отслеживать реестр Windows
heuristicAnalysis=true  ; эвристический анализ
cloudAnalysis=true  ; облачная проверка

[Quarantine]
; Настройки карантина
enabled=true
quarantinePath=C:\ProgramData\SecureGuard\Quarantine\
autoDeleteInfected=false  ; автоматически удалять заражённые файлы
maxQuarantineSizeMB=500  ; максимальный размер карантина (МБ)
keepQuarantineDays=30  ; хранить файлы в карантине (дней)

[Updates]
; Настройки обновлений
autoDownload=true
autoInstall=true
updateServers=server1.secureguard.com,server2.secureguard.com
checkSignature=true  ; проверять цифровую подпись обновлений

[Logging]
; Логирование событий
logLevel=info  ; debug, info, warning, error
logFile=C:\ProgramData\SecureGuard\logs\antivirus.log
maxLogSizeMB=10  ; максимальный размер лога (МБ)
compressOldLogs=true  ; архивировать старые логи

[Exclusions]
; Исключения из проверки
processExclusions=notepad.exe,chrome.exe  ; процессы
fileExclusions=*.tmp,*.log  ; файлы по маске
pathExclusions=C:\Windows\,C:\Program Files\  ; пути

[NetworkProtection]
; Сетевая защита
firewallEnabled=true
blockMaliciousConnections=true
scanHTTPS=true  ; сканирование HTTPS‑трафика
allowedPorts=80,443,22  ; разрешённые порты

[Performance]
; Производительность
cpuUsageLimit=30  ; ограничение использования CPU (%)
scanPriority=normal  ; низкий, нормальный, высокий
useIdleTime=true  ; использовать время простоя системы

[Notifications]
; Уведомления
showScanProgress=true
notifyOnThreat=true
notifyOnUpdate=true
playSound=true  ; звуковой сигнал при угрозе

[Advanced]
; Расширенные настройки
enableRootkitDetection=true
memoryDumpAnalysis=false
deepHeuristicScan=false
customScanMasks=*.exe,*.dll,*.scr  ; типы файлов для углублённого сканирования
