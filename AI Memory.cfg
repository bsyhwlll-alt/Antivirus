# AI Memory Configuration File
# Версия: 2.0

[memory]
# Базовые настройки памяти
base_memory = 4096  # в MB
max_memory = 32768  # в MB
memory_pool_size = 8192
allocation_strategy = "dynamic"

[context]
# Настройки контекста
context_window = 8192  # максимальное количество токенов
short_term_memory = 1000  # последние сообщений
long_term_memory = 100000  # всего сообщений в истории
compression_ratio = 0.75

[performance]
# Производительность
thread_pool_size = 4
batch_processing = true
batch_size = 32
prefetch_enabled = true
prefetch_limit = 10

[storage]
# Хранилище данных
storage_type = "hybrid"  # hybrid, ram, disk
ram_limit = 8192  # в MB
disk_cache = "/tmp/ai_cache"
disk_limit = 102400  # в MB
compression_method = "lz4"

[advanced]
# Расширенные настройки
vector_memory_enabled = true
vector_dimension = 768
embedding_cache_size = 5000
similarity_threshold = 0.85
pruning_enabled = true
pruning_threshold = 0.3
